name: daily-collect

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          ./setup.sh
      - name: Run collector
        run: |
          svwb-collect
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-collect-${{ github.run_id }}
          path: |
            data/svwb.sqlite
            exports/latest.json
            latest_summary.md
          if-no-files-found: error
