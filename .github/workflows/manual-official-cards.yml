name: manual-official-cards

on:
  workflow_dispatch:

jobs:
  collect-official-cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup
        run: |
          ./setup.sh

      - name: Run official_cards only
        run: |
          svwb-collect --sources official_cards --timeout 30 --min-interval 1.0

      - name: Collect run metrics
        id: classify
        run: |
          python - <<'PY'
          import json
          import os
          import sqlite3
          from pathlib import Path

          conn = sqlite3.connect('data/svwb.sqlite')
          run_id, run_status, warning_count = conn.execute(
              "SELECT id, status, warning_count FROM runs ORDER BY id DESC LIMIT 1"
          ).fetchone()
          total_items = conn.execute("SELECT COUNT(*) FROM items").fetchone()[0]
          conn.close()

          latest = json.loads(Path('exports/latest.json').read_text(encoding='utf-8'))
          total_items = int(latest.get('total_items', total_items))
          source_urls = []
          for item in latest.get('sources', {}).get('official_cards', []):
              payload = item.get('payload') or {}
              url = payload.get('source_url') or payload.get('origin_url')
              if url and url not in source_urls:
                  source_urls.append(url)
          source_urls_str = ', '.join(source_urls) if source_urls else 'n/a'

          summary_text = Path('latest_summary.md').read_text(encoding='utf-8')
          blocked = 'BLOCKED' in summary_text
          result = 'SUCCESS' if (total_items > 0 and not blocked) else 'PARTIAL'

          warning_lines = [line for line in summary_text.splitlines() if line.startswith('- official_cards:')][:3]
          warning_preview = '\n'.join(warning_lines) if warning_lines else '- none'

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"run_id={run_id}\n")
              f.write(f"run_status={run_status}\n")
              f.write(f"result_label={result}\n")
              f.write(f"total_items={total_items}\n")
              f.write(f"warning_count={warning_count}\n")
              f.write(f"blocked={'yes' if blocked else 'no'}\n")
              f.write("generated_files=data/svwb.sqlite, exports/latest.json, latest_summary.md\n")
              f.write(f"source_url={source_urls_str}\n")
              f.write("warning_preview<<EOF\n")
              f.write(warning_preview + "\n")
              f.write("EOF\n")

          if result == 'PARTIAL':
              print('::warning::official_cards result=PARTIAL (check Job Summary and artifacts)')
          PY

      - name: Write Job Summary
        run: |
          {
            echo "## official_cards first check"
            echo ""
            echo "- Result: **${{ steps.classify.outputs.result_label }}**"
            echo "- run_status: `${{ steps.classify.outputs.run_status }}`"
            echo "- total_items: **${{ steps.classify.outputs.total_items }}**"
            echo "- warnings 件数: **${{ steps.classify.outputs.warning_count }}**"
            echo "- blocked source: **${{ steps.classify.outputs.blocked }}**"
            echo "- source_url: `${{ steps.classify.outputs.source_url }}`"
            echo "- 生成ファイル: `${{ steps.classify.outputs.generated_files }}`"
            echo ""
            echo "### latest_summary.md 要点"
            echo "${{ steps.classify.outputs.warning_preview }}"
            echo ""
            echo "判定ルール: total_items > 0 かつ blocked なし => **SUCCESS** / それ以外 => **PARTIAL**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload official_cards artifacts
        uses: actions/upload-artifact@v4
        with:
          name: official-cards-run-${{ steps.classify.outputs.run_id }}-${{ steps.classify.outputs.run_status }}
          path: |
            data/svwb.sqlite
            exports/latest.json
            latest_summary.md
          if-no-files-found: error
