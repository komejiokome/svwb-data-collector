name: verify

on:
  push:
  pull_request:

jobs:
  smoke-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          ./setup.sh
      - name: CLI help smoke
        run: |
          svwb-collect --help
      - name: Run tests
        run: |
          python -m unittest discover -s tests -v
